name: Continuous Integration

on:
  pull_request:
  push:
  workflow_dispatch:
  release:
    types: [ published ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ###########################################################
  # LINT
  ###########################################################

  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: Install project
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1
        run: uv sync --locked --all-groups --all-extras --dev

      - run: uvx ruff format --diff ./src/ ./tests/
      - run: uvx ruff check --extend-select I ./src/ ./tests/
      - run: uvx pyright ./src/ ./tests/


  ###########################################################
  # TESTS
  ###########################################################

  tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: Install project
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1
        run: uv sync --locked --all-extras --all-groups --dev

      - run: uv run pytest tests/unit/


  ###########################################################
  # PREPARE IMAGE METADATA
  ###########################################################

  prepare-image:
    name: Prepare container metadata
    needs: [ lint, tests ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Compute metadata
        id: meta
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="$(echo ${GITHUB_SHA} | cut -c1-7)"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"


  ###########################################################
  # BUILD IMAGE (PARALLEL PER ARCH)
  ###########################################################

  build-image:
    name: Build (${{ matrix.platform }})
    needs: prepare-image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}     # <-- no IAM role needed

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.ref == 'refs/heads/main' }}
          outputs: |
            type=image,name=${{ needs.prepare-image.outputs.image }},push-by-digest=true,name-canonical=true,push=${{ github.ref == 'refs/heads/main' }}
          cache-from: |
            type=gha,scope=${{ github.ref_name }}-${{ matrix.platform }}
          cache-to: |
            type=gha,mode=max,scope=${{ github.ref_name }}-${{ matrix.platform }}

      - name: Export digest
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Sanitize platform name
        if: github.ref == 'refs/heads/main'
        id: platform
        run: echo "name=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
        env:
          PLATFORM: ${{ matrix.platform }}

      - uses: actions/upload-artifact@v6
        if: github.ref == 'refs/heads/main'
        with:
          name: digests-${{ steps.platform.outputs.name }}
          path: /tmp/digests/*
          retention-days: 1


  ###########################################################
  # CREATE MULTI-ARCH IMAGE
  ###########################################################

  push-image:
    name: Publish multi-arch image
    needs: [ prepare-image, build-image ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: digests-*
          merge-multiple: true
          path: /tmp/digests

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list
        working-directory: /tmp/digests
        run: |
          IMAGE=${{ needs.prepare-image.outputs.image }}
          TAG=${{ needs.prepare-image.outputs.tag }}

          docker buildx imagetools create \
            -t ${IMAGE}:${TAG} \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
          ${{ needs.prepare-image.outputs.image }}:${{ needs.prepare-image.outputs.tag }}
