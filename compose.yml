name: fastapi-project-template

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    entrypoint: [ "/opt/keycloak/data/import/keycloak-entrypoint.sh" ]
    environment:
      # Disable Scalable Vector Extension, otherwise Critical error in keycloak container (emulation does not work locally on Mac M4 >15.2)
      JAVA_TOOL_OPTIONS: ${KEYCLOAK_JAVA_TOOL_OPTIONS}
      KC_DB: dev-file
      KC_DB_USERNAME: dev
      KC_DB_PASSWORD: dev
      KC_BOOTSTRAP_ADMIN_USERNAME: dev
      KC_BOOTSTRAP_ADMIN_PASSWORD: dev
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: true
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./.docker/keycloak/data/import:/opt/keycloak/data/import
    restart: unless-stopped
    ports:
      - "8085:8080"
    networks:
      common:
        aliases:
          - keycloak

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z.hotfix.7aa24e772
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-root}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-rootroot}"
    command: [
      "server",
      "/data",
      "--console-address",
      ":9001"
    ]
    volumes:
      - minio-data:/data
    networks:
      common:
        aliases:
          - minio

  rabbitmq:
    image: docker.io/library/rabbitmq:4.2.5-management
    environment:
      RABBITMQ_ERLANG_COOKIE: 'secret_cookie'
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./.docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
      - ./.docker/rabbitmq/init.sh:/init.sh
      - rabbitmq_data:/var/lib/rabbitmq
    command: [ "bash", "-c", "/init.sh" ]
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      common:
        aliases:
          - rabbitmq

  valkey:
    image: docker.io/valkey/valkey:9.0.3-alpine
    command:
      - /bin/sh
      - -c
      - valkey-server --requirepass "$${VALKEY_PASSWORD}"
    ports:
      - "6379:6379"
    environment:
      VALKEY_REPLICATION_MODE: "master"
      VALKEY_PASSWORD: "${VALKEY_PASSWORD}"
    networks:
      common:
        aliases:
          - valkey

  opa:
    image: docker.io/openpolicyagent/opa:1.15.2
    ports:
      - "8181:8181"
    volumes:
      - ./.docker/opa/policies:/policies
    command:
      - run
      - --server
      - --log-level
      - debug
      - --addr=0.0.0.0:8181
      - /policies
    networks:
      common:
        aliases:
          - opa

  db:
    image: docker.io/library/postgres:18.3
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-template_app_db}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-dev}"
      POSTGRES_USER: "${POSTGRES_USER:-dev}"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h $$(hostname -i)" ]
      start_period: 3s
      interval: 3s
      timeout: 15s
      retries: 10
    volumes:
      - db:/var/lib/postgresql/18
    networks:
      common:
        aliases:
          - db

  db-migrate:
    build:
      context: ./
      dockerfile: Containerfile
    image: localhost/fastapi-project-template
    environment:
      DB_DSN: "postgresql+asyncpg://${POSTGRES_USER:-dev}:${POSTGRES_PASSWORD:-dev}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-template_app_db}"
      LOGGING_LEVEL: "${LOGGING_LEVEL:-DEBUG}"
    entrypoint: python3
    command: [ "-m", "alembic", "upgrade", "head" ]
    depends_on:
      db:
        condition: service_healthy
    networks:
      common:
        aliases:
          - db-migrate

  react-template:
    image: ghcr.io/kamikaze/react-project-template:v0.0.10
    ports:
      - "5173:8080"
    depends_on:
      keycloak:
        condition: service_started
    networks:
      common:
        aliases:
          - react-template

  fastapi-project-template:
    build:
      context: ./
      dockerfile: Containerfile
    image: localhost/fastapi-project-template
    ports:
      - "8000:8080"
    environment:
      AMQP_DSN: "${AMQP_DSN:-amqp://guest:guest@rabbitmq/}"
      DB_DSN: "postgresql+asyncpg://${POSTGRES_USER:-dev}:${POSTGRES_PASSWORD:-dev}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-template_app_db}"
      LOGGING_LEVEL: "${LOGGING_LEVEL:-DEBUG}"
      OBJECT_STORAGE_ENDPOINT: "${OBJECT_STORAGE_ENDPOINT:-http://localhost:9000}"
      OBJECT_STORAGE_BUCKET: "${OBJECT_STORAGE_BUCKET:-test}"
      S3_ENDPOINT_URL: "${S3_ENDPOINT_URL:-http://localhost:9000}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      S3_ADDRESSING_STYLE: "${S3_ADDRESSING_STYLE:-path}"
      S3_BUCKET: "${S3_BUCKET:-test}"
      S3_BUCKET_ROOT: "${S3_BUCKET_ROOT:-test}"
      S3_SECURE: "${S3_SECURE:-false}"
      S3_CERT_VERIFY: "${S3_CERT_VERIFY:-false}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-root}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-rootroot}"
      OIDC_ENABLED: "${OIDC_ENABLED:-false}"
      OIDC_AUTHORITY_URL: "http://localhost:8085/realms/app"
      OIDC_AUTHORITY_INTERNAL_URL: "http://keycloak:8080/realms/app"
      OIDC_CLIENT_ID: "frontend"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET:-}"
      OIDC_REDIRECT_URI: http://localhost:5173/
      OIDC_SCOPE: "openid profile email"
      OPA_URL: "${OPA_URL:-http://opa:8181/v1/data/app/authz}"
    depends_on:
      db:
        condition: service_healthy
      opa:
        condition: service_started
      minio:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      valkey:
        condition: service_started
      keycloak:
        condition: service_started
      db-migrate:
        condition: service_completed_successfully
    networks:
      common:
        aliases:
          - fastapi-project-template

volumes:
  db:
  keycloak-data:
  minio-data:
  rabbitmq_data:

networks:
  common:
    driver: bridge
